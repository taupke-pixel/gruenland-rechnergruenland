<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Grünland RF & NDF Rechner</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:15px;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

input,
textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
min-height:80px;
}

button{
border:none;
border-radius:10px;
padding:10px 14px;
cursor:pointer;
margin:3px;
}

.btn{
background:#111;
color:white;
}

.btn-red{
background:#c62828;
color:white;
}

.btn-green{
background:#2e7d32;
color:white;
}

.btn-blue{
background:#1565c0;
color:white;
}

.cut-card{
background:#fafafa;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
margin-top:12px;
}

.small{
font-size:13px;
color:#666;
}

.formula{
background:#f8f8f8;
padding:10px;
border-radius:10px;
margin-top:8px;
word-break:break-word;
}

.stat{
font-size:18px;
font-weight:bold;
margin-top:8px;
}

@media(max-width:700px){

body{
padding:10px;
}

.card{
padding:12px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Grünland RF & NDF Rechner</h1>

<div class="grid">

<div>
<label>Jahr</label>
<input id="year" type="number" value="2026">
</div>

<div>
<label>Schnitt</label>
<input id="schnitt" type="number" value="1">
</div>

<div>
<label>Datum</label>
<input id="datum" type="date">
</div>

<div>
<label>TM-Ertrag (t/ha)</label>
<input id="tm" type="number" step="0.01">
</div>

<div>
<label>RP (% TM)</label>
<input id="rp" type="number" step="0.01">
</div>

</div>

<br>

<label>Notiz</label>

<textarea id="notiz"></textarea>

<br><br>

<button class="btn" onclick="addCut()">
Schnitt speichern
</button>

<button class="btn-blue" onclick="exportData()">
Backup exportieren
</button>

<input
type="file"
id="importFile"
onchange="importData(event)">

</div>

<div class="card">

<h2>Startformel</h2>

<div class="formula">

RF = 31.5 − (0.65 × RP) + (0.15 × TM)

<br><br>

NDF = 48 − (0.80 × RP) + (0.25 × TM)

</div>

</div>

<div class="card">

<h2>Aktuelle Formel</h2>

<div
id="currentFormula"
class="formula">
</div>

</div>

<div class="card">

<h2>Statistik</h2>

<div id="stats">
</div>

</div>

<div class="card">

<h2>Formelverlauf</h2>

<div id="historyContainer">
</div>

</div>

<div class="card">

<h2>Gespeicherte Schnitte</h2>

<div id="cutsContainer">
</div>

</div>
<script>

const STORAGE_KEY = "gruenland_rf_ndf_v5";

const START_RF_BASE = 31.5;
const START_RF_RP   = 0.65;
const START_RF_TM   = 0.15;

const START_NDF_BASE = 48;
const START_NDF_RP   = 0.80;
const START_NDF_TM   = 0.25;

let data = loadData();

function loadData(){

    const saved =
        localStorage.getItem(STORAGE_KEY);

    if(saved){

        try{
            return JSON.parse(saved);
        }
        catch(e){
        }

    }

    return {

        cuts:[],

        history:[],

        formula:{

            rfBase:START_RF_BASE,
            rfRp:START_RF_RP,
            rfTm:START_RF_TM,

            ndfBase:START_NDF_BASE,
            ndfRp:START_NDF_RP,
            ndfTm:START_NDF_TM

        }

    };

}

function saveData(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

}

function currentRF(rp,tm){

    return (
        data.formula.rfBase
        - (data.formula.rfRp * rp)
        + (data.formula.rfTm * tm)
    );

}

function currentNDF(rp,tm){

    return (
        data.formula.ndfBase
        - (data.formula.ndfRp * rp)
        + (data.formula.ndfTm * tm)
    );

}

function addCut(){

    const year =
        document.getElementById("year").value;

    const schnitt =
        document.getElementById("schnitt").value;

    const datum =
        document.getElementById("datum").value;

    const tm =
        parseFloat(
            document
            .getElementById("tm")
            .value
            .replace(",",".")
        );

    const rp =
        parseFloat(
            document
            .getElementById("rp")
            .value
            .replace(",",".")
        );

    const notiz =
        document.getElementById("notiz").value;

    if(
        isNaN(tm) ||
        isNaN(rp)
    ){
        alert("TM und RP eingeben");
        return;
    }

    const rfEstimate =
        currentRF(rp,tm);

    const ndfEstimate =
        currentNDF(rp,tm);

    data.cuts.unshift({

        id:Date.now(),

        year,
        schnitt,
        datum,

        tm,
        rp,

        notiz,

        rfEstimate:
            Number(
                rfEstimate.toFixed(2)
            ),

        ndfEstimate:
            Number(
                ndfEstimate.toFixed(2)
            ),

        rfLabor:null,
        ndfLabor:null,

        calibrated:false

    });

    saveData();

    render();

}

function deleteCut(id){

    if(
        !confirm(
            "Schnitt löschen?"
        )
    ){
        return;
    }

    data.cuts =
        data.cuts.filter(
            x => x.id !== id
        );

    saveData();

    render();

}

function editCut(id){

    const cut =
        data.cuts.find(
            x => x.id === id
        );

    if(!cut){
        return;
    }

    const newTM =
        prompt(
            "TM-Ertrag",
            cut.tm
        );

    if(newTM===null){
        return;
    }

    const newRP =
        prompt(
            "RP",
            cut.rp
        );

    if(newRP===null){
        return;
    }

    cut.tm =
        Number(
            String(newTM)
            .replace(",",".")
        );

    cut.rp =
        Number(
            String(newRP)
            .replace(",",".")
        );

    cut.rfEstimate =
        Number(
            currentRF(
                cut.rp,
                cut.tm
            ).toFixed(2)
        );

    cut.ndfEstimate =
        Number(
            currentNDF(
                cut.rp,
                cut.tm
            ).toFixed(2)
        );

    saveData();

    render();

}

function renderCurrentFormula(){

    document.getElementById(
        "currentFormula"
    ).innerHTML =

    `
    RF =
    ${data.formula.rfBase.toFixed(2)}
    -
    (${data.formula.rfRp.toFixed(3)}
    × RP)
    +
    (${data.formula.rfTm.toFixed(3)}
    × TM)

    <br><br>

    NDF =
    ${data.formula.ndfBase.toFixed(2)}
    -
    (${data.formula.ndfRp.toFixed(3)}
    × RP)
    +
    (${data.formula.ndfTm.toFixed(3)}
    × TM)
    `;

}
    function saveLaborValues(id){

    const cut =
        data.cuts.find(
            x => x.id === id
        );

    if(!cut){
        return;
    }

    const rfInput =
        document.getElementById(
            "rf_" + id
        );

    const ndfInput =
        document.getElementById(
            "ndf_" + id
        );

    const rfLabor =
        Number(
            String(rfInput.value)
            .replace(",",".")
        );

    const ndfLabor =
        Number(
            String(ndfInput.value)
            .replace(",",".")
        );

    if(
        isNaN(rfLabor) ||
        isNaN(ndfLabor)
    ){
        alert(
            "RF und NDF Laborwerte eingeben"
        );
        return;
    }

    cut.rfLabor = rfLabor;
    cut.ndfLabor = ndfLabor;
    cut.calibrated = true;

    recalculateFormula();

    saveData();

    render();

}

function recalculateFormula(){

    const calibrated =
        data.cuts.filter(
            x =>
                x.calibrated &&
                x.rfLabor !== null &&
                x.ndfLabor !== null
        );

    if(
        calibrated.length === 0
    ){
        return;
    }

    let rfBase =
        START_RF_BASE;

    let ndfBase =
        START_NDF_BASE;

    let rfErrorSum = 0;
    let ndfErrorSum = 0;

    calibrated.forEach(c => {

        rfErrorSum +=
            (
                c.rfLabor -
                c.rfEstimate
            );

        ndfErrorSum +=
            (
                c.ndfLabor -
                c.ndfEstimate
            );

    });

    const avgRFError =
        rfErrorSum /
        calibrated.length;

    const avgNDFError =
        ndfErrorSum /
        calibrated.length;

    data.formula.rfBase =
        Number(
            (
                rfBase +
                avgRFError
            ).toFixed(3)
        );

    data.formula.nddfBase =
        data.formula.ndfBase;

    data.formula.ndfBase =
        Number(
            (
                ndfBase +
                avgNDFError
            ).toFixed(3)
        );

    data.history.unshift({

        date:
            new Date()
            .toLocaleString(),

        formula:

            "RF = " +
            data.formula.rfBase.toFixed(2) +
            " - (" +
            data.formula.rfRp.toFixed(3) +
            " × RP) + (" +
            data.formula.rfTm.toFixed(3) +
            " × TM)" +

            " | NDF = " +

            data.formula.ndfBase.toFixed(2) +
            " - (" +
            data.formula.ndfRp.toFixed(3) +
            " × RP) + (" +
            data.formula.ndfTm.toFixed(3) +
            " × TM)"

    });

}

function exportData(){

    const blob =
        new Blob(
            [
                JSON.stringify(
                    data,
                    null,
                    2
                )
            ],
            {
                type:
                "application/json"
            }
        );

    const url =
        URL.createObjectURL(
            blob
        );

    const a =
        document.createElement(
            "a"
        );

    a.href = url;

    a.download =
        "gruenland_backup.json";

    a.click();

}

function importData(event){

    const file =
        event.target.files[0];

    if(!file){
        return;
    }

    const reader =
        new FileReader();

    reader.onload =
        function(e){

            try{

                data =
                    JSON.parse(
                        e.target.result
                    );

                saveData();

                render();

            }
            catch(err){

                alert(
                    "Datei ungültig"
                );

            }

        };

    reader.readAsText(
        file
    );

}

function renderStats(){

    const calibrated =
        data.cuts.filter(
            x =>
                x.calibrated
        );

    let rfDiff = 0;
    let ndfDiff = 0;

    calibrated.forEach(c => {

        rfDiff +=
            Math.abs(
                c.rfLabor -
                c.rfEstimate
            );

        ndfDiff +=
            Math.abs(
                c.ndfLabor -
                c.ndfEstimate
            );

    });

    const avgRF =
        calibrated.length
        ?
        (
            rfDiff /
            calibrated.length
        ).toFixed(2)
        :
        "-";

    const avgNDF =
        calibrated.length
        ?
        (
            ndfDiff /
            calibrated.length
        ).toFixed(2)
        :
        "-";

    document.getElementById(
        "stats"
    ).innerHTML =

    `
    <div class="stat">
    Schnitte:
    ${data.cuts.length}
    </div>

    <div class="stat">
    Kalibriert:
    ${calibrated.length}
    </div>

    <div class="stat">
    Ø RF-Abweichung:
    ${avgRF}
    </div>

    <div class="stat">
    Ø NDF-Abweichung:
    ${avgNDF}
    </div>
    `;

}

function renderHistory(){

    document.getElementById(
        "historyContainer"
    ).innerHTML =

    data.history.map(h =>

        `
        <div class="cut-card">

        <strong>
        ${h.date}
        </strong>

        <br><br>

        ${h.formula}

        </div>
        `

    ).join("");

}

function renderCuts(){

    document.getElementById(
        "cutsContainer"
    ).innerHTML =

    data.cuts.map(c =>

        `
        <div class="cut-card">

        <strong>
        ${c.year}
        -
        ${c.schnitt}. Schnitt
        </strong>

        <br><br>

        Datum:
        ${c.datum || "-"}

        <br>

        TM:
        ${c.tm}

        <br>

        RP:
        ${c.rp}

        <br><br>

        RF geschätzt:
        ${c.rfEstimate}

        <br>

        NDF geschätzt:
        ${c.ndfEstimate}

        <br><br>

        Notiz:

        <br>

        ${c.notiz || "-"}

        <br><br>

        ${
            c.calibrated
            ?
            `
            RF Labor:
            ${c.rfLabor}

            <br>

            NDF Labor:
            ${c.ndfLabor}
            `
            :
            `

            RF Labor

            <input
            id="rf_${c.id}"
            type="number">

            NDF Labor

            <input
            id="ndf_${c.id}"
            type="number">

            <button
            class="btn-green"
            onclick="saveLaborValues(${c.id})">

            Laborwerte speichern

            </button>

            `
        }

        <br>

        <button
        class="btn-blue"
        onclick="editCut(${c.id})">

        Bearbeiten

        </button>

        <button
        class="btn-red"
        onclick="deleteCut(${c.id})">

        Löschen

        </button>

        </div>
        `

    ).join("");

}

function render(){

    renderCurrentFormula();

    renderStats();

    renderHistory();

    renderCuts();

}

render();


function calculateRegression(target){

    const calibrated =
        data.cuts.filter(c =>
            c.calibrated &&
            c.rfLabor !== null &&
            c.ndfLabor !== null
        );

    if(calibrated.length < 3){
        return null;
    }

    const rows = calibrated.map(c => {

        return {
            x1: 1,
            x2: Number(c.rp),
            x3: Number(c.tm),
            y:
                target === "rf"
                ? Number(c.rfLabor)
                : Number(c.ndfLabor)
        };

    });

    let n = rows.length;

    let sx2=0,sx3=0,sy=0;
    let sx2x2=0,sx3x3=0,sx2x3=0;
    let sx2y=0,sx3y=0;

    rows.forEach(r=>{

        sx2 += r.x2;
        sx3 += r.x3;
        sy += r.y;

        sx2x2 += r.x2*r.x2;
        sx3x3 += r.x3*r.x3;
        sx2x3 += r.x2*r.x3;

        sx2y += r.x2*r.y;
        sx3y += r.x3*r.y;

    });

    const A = [
        [n,sx2,sx3],
        [sx2,sx2x2,sx2x3],
        [sx3,sx2x3,sx3x3]
    ];

    const B = [
        sy,
        sx2y,
        sx3y
    ];

    const result =
        solve3x3(A,B);

    if(!result){
        return null;
    }

    return {
        base:result[0],
        rp:result[1],
        tm:result[2]
    };

}

function solve3x3(A,B){

    const M = [

        [A[0][0],A[0][1],A[0][2],B[0]],
        [A[1][0],A[1][1],A[1][2],B[1]],
        [A[2][0],A[2][1],A[2][2],B[2]]

    ];

    for(let i=0;i<3;i++){

        let maxRow=i;

        for(let k=i+1;k<3;k++){

            if(
                Math.abs(M[k][i]) >
                Math.abs(M[maxRow][i])
            ){
                maxRow=k;
            }

        }

        [
            M[i],
            M[maxRow]
        ] =
        [
            M[maxRow],
            M[i]
        ];

        if(
            Math.abs(M[i][i]) < 0.000001
        ){
            return null;
        }

        for(let k=i+1;k<3;k++){

            const c =
                M[k][i] /
                M[i][i];

            for(let j=i;j<4;j++){

                M[k][j] -=
                    c *
                    M[i][j];

            }

        }

    }

    const x=[0,0,0];

    for(let i=2;i>=0;i--){

        x[i]=M[i][3];

        for(let j=i+1;j<3;j++){

            x[i]-=
                M[i][j]*
                x[j];

        }

        x[i]/=M[i][i];

    }

    return x;
            function updateFormulaFromAllCuts(){

    const rfModel =
        calculateRegression("rf");

    const ndfModel =
        calculateRegression("ndf");

    let activeFormula =
        "Startformel";

    if(rfModel){

        const rfValid =

            rfModel.base > 0 &&
            rfModel.base < 100 &&

            rfModel.rp < 0 &&
            rfModel.rp > -5 &&

            rfModel.tm > -5 &&
            rfModel.tm < 5;

        if(rfValid){

            data.formula.rfBase =
                Number(
                    rfModel.base.toFixed(4)
                );

            data.formula.rfRp =
                Number(
                    Math.abs(
                        rfModel.rp
                    ).toFixed(4)
                );

            data.formula.rfTm =
                Number(
                    rfModel.tm.toFixed(4)
                );

            activeFormula =
                "Betriebsformel";

        }

    }

    if(ndfModel){

        const ndfValid =

            ndfModel.base > 0 &&
            ndfModel.base < 100 &&

            ndfModel.rp < 0 &&
            ndfModel.rp > -5 &&

            ndfModel.tm > -5 &&
            ndfModel.tm < 5;

        if(ndfValid){

            data.formula.ndfBase =
                Number(
                    ndfModel.base.toFixed(4)
                );

            data.formula.ndfRp =
                Number(
                    Math.abs(
                        ndfModel.rp
                    ).toFixed(4)
                );

            data.formula.ndfTm =
                Number(
                    ndfModel.tm.toFixed(4)
                );

            activeFormula =
                "Betriebsformel";

        }

    }

    data.activeFormula =
        activeFormula;

    data.history.unshift({

        date:
            new Date()
            .toLocaleString(),

        formula:

            "RF = " +

            data.formula.rfBase.toFixed(3) +

            " - (" +

            data.formula.rfRp.toFixed(3) +

            " × RP) + (" +

            data.formula.rfTm.toFixed(3) +

            " × TM) | NDF = " +

            data.formula.ndfBase.toFixed(3) +

            " - (" +

            data.formula.ndfRp.toFixed(3) +

            " × RP) + (" +

            data.formula.ndfTm.toFixed(3) +

            " × TM)"

    });

}

const oldSaveLaborValues =
    saveLaborValues;

saveLaborValues =
function(id){

    oldSaveLaborValues(id);

    updateFormulaFromAllCuts();

    saveData();

    render();
                const oldRenderStats =
    renderStats;

renderStats =
function(){

    oldRenderStats();

    const stats =
        document.getElementById(
            "stats"
        );

    stats.innerHTML +=

    `
    <div class="stat">

    Aktive Formel:

    ${data.activeFormula || "Startformel"}

    </div>
    `;

};

const oldEditCut =
    editCut;

editCut =
function(id){

    oldEditCut(id);

    const cut =
        data.cuts.find(
            x => x.id === id
        );

    if(
        cut &&
        cut.calibrated
    ){

        updateFormulaFromAllCuts();

        saveData();

        render();

    }

};

const oldDeleteCut =
    deleteCut;

deleteCut =
function(id){

    oldDeleteCut(id);

    updateFormulaFromAllCuts();

    saveData();

    render();

};

function recalculateEstimates(){

    data.cuts.forEach(c => {

        c.rfEstimate =
            Number(
                currentRF(
                    c.rp,
                    c.tm
                ).toFixed(2)
            );

        c.ndfEstimate =
            Number(
                currentNDF(
                    c.rp,
                    c.tm
                ).toFixed(2)
            );

    });

}

const oldUpdateFormula =
    updateFormulaFromAllCuts;

updateFormulaFromAllCuts =
function(){

    oldUpdateFormula();

    recalculateEstimates();

    saveData();

};

render();

</script>

</body>
            </html>
