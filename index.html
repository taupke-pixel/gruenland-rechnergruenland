<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Grünland RF & NDF Rechner V6</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f3f4f6;
padding:15px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}

h1,h2,h3{
margin-bottom:12px;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
}

input,
textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
min-height:90px;
resize:vertical;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-right:5px;
margin-top:5px;
}

.btn{
background:#111;
color:white;
}

.btn-green{
background:#2e7d32;
color:white;
}

.btn-blue{
background:#1565c0;
color:white;
}

.btn-red{
background:#c62828;
color:white;
}

.formulaBox{
background:#f7f7f7;
padding:12px;
border-radius:12px;
line-height:1.6;
}

.cutCard{
background:#fafafa;
border:1px solid #ddd;
border-radius:12px;
padding:12px;
margin-top:10px;
}

.stat{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.small{
font-size:13px;
color:#666;
}

@media(max-width:700px){

body{
padding:10px;
}

.card{
padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Grünland RF & NDF Rechner</h1>

<div class="grid">

<div>
<label>Jahr</label>
<input id="year" type="number" value="2026">
</div>

<div>
<label>Schnitt</label>
<input id="schnitt" type="number" value="1">
</div>

<div>
<label>Datum</label>
<input id="datum" type="date">
</div>

<div>
<label>TM-Ertrag (t/ha)</label>
<input id="tm" type="number" step="0.01">
</div>

<div>
<label>RP (% TM)</label>
<input id="rp" type="number" step="0.01">
</div>

</div>

<br>

<label>Notiz</label>

<textarea id="notiz"></textarea>

<br>

<button class="btn" onclick="addCut()">
Schnitt speichern
</button>

<button class="btn-blue" onclick="exportData()">
Backup exportieren
</button>

<input
type="file"
id="importFile"
onchange="importData(event)"
style="margin-top:10px">

</div>

<div class="card">

<h2>Startformel</h2>

<div class="formulaBox">

RF = 31.5 − (0.65 × RP) + (0.15 × TM)

<br><br>

NDF = 48 − (0.80 × RP) + (0.25 × TM)

</div>

</div>

<div class="card">

<h2>Aktive Formel</h2>

<div
id="formulaContainer"
class="formulaBox">
</div>

</div>

<div class="card">

<h2>Statistik</h2>

<div id="statsContainer">
</div>

</div>

<div class="card">

<h2>Formelverlauf</h2>

<div id="historyContainer">
</div>

</div>

<div class="card">

<h2>Gespeicherte Schnitte</h2>

<div id="cutsContainer">
</div>

</div>

<script>
    const STORAGE_KEY = "gruenland_v6";

const START_FORMULA = {

    rfBase:31.5,
    rfRp:-0.65,
    rfTm:0.15,

    ndfBase:48,
    ndfRp:-0.80,
    ndfTm:0.25

};

let data = loadData();

function loadData(){

    try{

        const saved =
            localStorage.getItem(
                STORAGE_KEY
            );

        if(saved){
            return JSON.parse(saved);
        }

    }catch(e){}

    return {

        cuts:[],

        history:[],

        activeFormula:"Startformel",

        formula:{
            ...START_FORMULA
        }

    };

}

function saveData(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

}

function exportData(){

    const blob =
        new Blob(
            [
                JSON.stringify(
                    data,
                    null,
                    2
                )
            ],
            {
                type:
                "application/json"
            }
        );

    const url =
        URL.createObjectURL(
            blob
        );

    const a =
        document.createElement(
            "a"
        );

    a.href = url;

    a.download =
        "gruenland_backup.json";

    a.click();

}

function importData(event){

    const file =
        event.target.files[0];

    if(!file){
        return;
    }

    const reader =
        new FileReader();

    reader.onload =
        function(e){

            try{

                data =
                    JSON.parse(
                        e.target.result
                    );

                saveData();

                render();

            }
            catch(err){

                alert(
                    "Ungültige Datei"
                );

            }

        };

    reader.readAsText(
        file
    );

}

function predictRF(rp,tm){

    return (

        data.formula.rfBase +

        data.formula.rfRp * rp +

        data.formula.rfTm * tm

    );

}

function predictNDF(rp,tm){

    return (

        data.formula.ndfBase +

        data.formula.ndfRp * rp +

        data.formula.ndfTm * tm

    );

}

function addCut(){

    const year =
        document.getElementById(
            "year"
        ).value;

    const schnitt =
        document.getElementById(
            "schnitt"
        ).value;

    const datum =
        document.getElementById(
            "datum"
        ).value;

    const notiz =
        document.getElementById(
            "notiz"
        ).value;

    const tm =
        parseFloat(
            String(
                document
                .getElementById("tm")
                .value
            ).replace(",",".")
        );

    const rp =
        parseFloat(
            String(
                document
                .getElementById("rp")
                .value
            ).replace(",",".")
        );

    if(
        isNaN(tm) ||
        isNaN(rp)
    ){

        alert(
            "TM und RP eingeben"
        );

        return;

    }

    data.cuts.unshift({

        id:Date.now(),

        year,
        schnitt,
        datum,
        notiz,

        tm,
        rp,

        rfEstimate:
            Number(
                predictRF(
                    rp,
                    tm
                ).toFixed(2)
            ),

        ndfEstimate:
            Number(
                predictNDF(
                    rp,
                    tm
                ).toFixed(2)
            ),

        rfLabor:null,
        ndfLabor:null,

        calibrated:false,

        created:
            new Date()
            .toISOString(),

        modified:
            new Date()
            .toISOString()

    });

    saveData();

    render();

}

function deleteCut(id){

    if(
        !confirm(
            "Schnitt löschen?"
        )
    ){
        return;
    }

    data.cuts =
        data.cuts.filter(
            c => c.id !== id
        );

    recalculateModel();

    saveData();

    render();

}

function editCut(id){

    const cut =
        data.cuts.find(
            c => c.id === id
        );

    if(!cut){
        return;
    }

    const tm =
        prompt(
            "TM-Ertrag",
            cut.tm
        );

    if(tm===null){
        return;
    }

    const rp =
        prompt(
            "RP",
            cut.rp
        );

    if(rp===null){
        return;
    }

    cut.tm =
        Number(
            String(tm)
            .replace(",",".")
        );

    cut.rp =
        Number(
            String(rp)
            .replace(",",".")
        );

    cut.modified =
        new Date()
        .toISOString();

    recalculateModel();

    saveData();

    render();

}

function saveLabor(id){

    const cut =
        data.cuts.find(
            c => c.id === id
        );

    if(!cut){
        return;
    }

    const rf =
        parseFloat(
            String(
                document
                .getElementById(
                    "rf_"+id
                )
                .value
            ).replace(",",".")
        );

    const ndf =
        parseFloat(
            String(
                document
                .getElementById(
                    "ndf_"+id
                )
                .value
            ).replace(",",".")
        );

    if(
        isNaN(rf) ||
        isNaN(ndf)
    ){

        alert(
            "RF und NDF eingeben"
        );

        return;

    }

    cut.rfLabor = rf;
    cut.ndfLabor = ndf;
    cut.calibrated = true;

    cut.modified =
        new Date()
        .toISOString();

    recalculateModel();

    saveData();

    render();

}
    function solve3x3(A,b){

    const M = [
        [A[0][0],A[0][1],A[0][2],b[0]],
        [A[1][0],A[1][1],A[1][2],b[1]],
        [A[2][0],A[2][1],A[2][2],b[2]]
    ];

    for(let i=0;i<3;i++){

        let max=i;

        for(let k=i+1;k<3;k++){

            if(
                Math.abs(M[k][i]) >
                Math.abs(M[max][i])
            ){
                max=k;
            }

        }

        [M[i],M[max]] =
        [M[max],M[i]];

        if(
            Math.abs(M[i][i]) < 1e-10
        ){
            return null;
        }

        for(let k=i+1;k<3;k++){

            const c =
                M[k][i] /
                M[i][i];

            for(let j=i;j<4;j++){

                M[k][j] -=
                    c * M[i][j];

            }

        }

    }

    const x=[0,0,0];

    for(let i=2;i>=0;i--){

        x[i]=M[i][3];

        for(let j=i+1;j<3;j++){

            x[i]-=
                M[i][j]*x[j];

        }

        x[i]/=
            M[i][i];

    }

    return x;

}

function regressionModel(target){

    const rows =
        data.cuts.filter(c =>
            c.calibrated &&
            c.rfLabor !== null &&
            c.ndfLabor !== null
        );

    if(rows.length < 3){
        return null;
    }

    let sx=0;
    let sz=0;
    let sy=0;

    let sxx=0;
    let szz=0;
    let sxz=0;

    let sxy=0;
    let szy=0;

    rows.forEach(c => {

        const x =
            Number(c.rp);

        const z =
            Number(c.tm);

        const y =
            target==="rf"
            ? Number(c.rfLabor)
            : Number(c.ndfLabor);

        sx += x;
        sz += z;
        sy += y;

        sxx += x*x;
        szz += z*z;
        sxz += x*z;

        sxy += x*y;
        szy += z*y;

    });

    const A = [

        [rows.length,sx,sz],

        [sx,sxx,sxz],

        [sz,sxz,szz]

    ];

    const B = [

        sy,
        sxy,
        szy

    ];

    const result =
        solve3x3(A,B);

    if(!result){
        return null;
    }

    return {

        base:result[0],
        rp:result[1],
        tm:result[2]

    };

}

function modelLooksValid(model){

    if(!model){
        return false;
    }

    if(
        model.base < 0 ||
        model.base > 100
    ){
        return false;
    }

    if(
        model.rp > 0
    ){
        return false;
    }

    if(
        Math.abs(model.rp) > 5
    ){
        return false;
    }

    if(
        Math.abs(model.tm) > 5
    ){
        return false;
    }

    return true;

}

function recalculateModel(){

    const rfModel =
        regressionModel("rf");

    const ndfModel =
        regressionModel("ndf");

    if(
        modelLooksValid(rfModel) &&
        modelLooksValid(ndfModel)
    ){

        data.formula = {

            rfBase:
                Number(
                    rfModel.base.toFixed(5)
                ),

            rfRp:
                Number(
                    rfModel.rp.toFixed(5)
                ),

            rfTm:
                Number(
                    rfModel.tm.toFixed(5)
                ),

            ndfBase:
                Number(
                    ndfModel.base.toFixed(5)
                ),

            ndfRp:
                Number(
                    ndfModel.rp.toFixed(5)
                ),

            ndfTm:
                Number(
                    ndfModel.tm.toFixed(5)
                )

        };

        data.activeFormula =
            "Betriebsformel";

    }
    else{

        data.formula = {
            ...START_FORMULA
        };

        data.activeFormula =
            "Startformel";

    }

    data.cuts.forEach(c => {

        c.rfEstimate =
            Number(
                predictRF(
                    c.rp,
                    c.tm
                ).toFixed(2)
            );

        c.ndfEstimate =
            Number(
                predictNDF(
                    c.rp,
                    c.tm
                ).toFixed(2)
            );

    });

    data.history.unshift({

    date:
        new Date()
        .toLocaleString(),

    formula:

        "RF = " +

        data.formula.rfBase.toFixed(3) +

        " + (" +

        data.formula.rfRp.toFixed(3) +

        " × RP) + (" +

        data.formula.rfTm.toFixed(3) +

        " × TM)<br><br>" +

        "NDF = " +

        data.formula.ndfBase.toFixed(3) +

        " + (" +

        data.formula.ndfRp.toFixed(3) +

        " × RP) + (" +

        data.formula.ndfTm.toFixed(3) +

        " × TM)"

});
function renderFormula(){

    document.getElementById(
        "formulaContainer"
    ).innerHTML =

    `
    <b>${data.activeFormula}</b>

    <br><br>

    RF =
    ${data.formula.rfBase.toFixed(3)}
    +
    (${data.formula.rfRp.toFixed(3)}
    × RP)
    +
    (${data.formula.rfTm.toFixed(3)}
    × TM)

    <br><br>

    NDF =
    ${data.formula.ndfBase.toFixed(3)}
    +
    (${data.formula.ndfRp.toFixed(3)}
    × RP)
    +
    (${data.formula.ndfTm.toFixed(3)}
    × TM)
    `;

}

function renderStats(){

    const calibrated =
        data.cuts.filter(
            c => c.calibrated
        );

    let rfErr=0;
    let ndfErr=0;

    calibrated.forEach(c => {

        rfErr += Math.abs(
            c.rfLabor -
            c.rfEstimate
        );

        ndfErr += Math.abs(
            c.ndfLabor -
            c.ndfEstimate
        );

    });

    document.getElementById(
        "statsContainer"
    ).innerHTML =

    `
    <div class="stat">
    Schnitte:
    ${data.cuts.length}
    </div>

    <div class="stat">
    Kalibriert:
    ${calibrated.length}
    </div>

    <div class="stat">
    Aktive Formel:
    ${data.activeFormula}
    </div>

    <div class="stat">
    Ø RF Fehler:
    ${
        calibrated.length
        ?
        (rfErr/calibrated.length)
        .toFixed(2)
        :
        "-"
    }
    </div>

    <div class="stat">
    Ø NDF Fehler:
    ${
        calibrated.length
        ?
        (ndfErr/calibrated.length)
        .toFixed(2)
        :
        "-"
    }
    </div>
    `;

}

function renderHistory(){

    document.getElementById(
        "historyContainer"
    ).innerHTML =

    data.history
    .slice(0,100)
    .map(h =>

        `
        <div class="cutCard">

        <strong>
        ${h.date}
        </strong>

        <br><br>

        ${h.formula}

        </div>
        `

    ).join("");

}

function renderCuts(){

    document.getElementById(
        "cutsContainer"
    ).innerHTML =

    data.cuts.map(c => `

        <div class="cutCard">

        <strong>
        ${c.year} -
        ${c.schnitt}. Schnitt
        </strong>

        <br><br>

        Datum:
        ${c.datum || "-"}

        <br>

        TM:
        ${c.tm}

        <br>

        RP:
        ${c.rp}

        <br><br>

        RF:
        ${c.rfEstimate}

        <br>

        NDF:
        ${c.ndfEstimate}

        <br><br>

        ${c.notiz || ""}

        <br><br>

        ${
            c.calibrated
            ?

            `
            RF Labor:
            ${c.rfLabor}
            <br>
            NDF Labor:
            ${c.ndfLabor}
            `

            :

            `
            RF Labor
            <input
            id="rf_${c.id}"
            type="number"
            step="0.01">

            NDF Labor
            <input
            id="ndf_${c.id}"
            type="number"
            step="0.01">

            <button
            class="btn-green"
            onclick="saveLabor(${c.id})">

            Labor speichern

            </button>
            `
        }

        <br>

        <button
        class="btn-blue"
        onclick="editCut(${c.id})">

        Bearbeiten

        </button>

        <button
        class="btn-red"
        onclick="deleteCut(${c.id})">

        Löschen

        </button>

        </div>

    `).join("");

}

function render(){

    renderFormula();
    renderStats();
    renderHistory();
    renderCuts();

}

render();

</script>

</body>
</html>
